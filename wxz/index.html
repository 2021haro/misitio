<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páginas_Nopor</title>
    
    <link rel="icon" type="image/png" href="icono.png">

    <style>
        /* =======================================================
           CAMBIA LOS COLORES AQUÍ ABAJO Y SE MODIFICARÁ TODO 
        ======================================================= */
        :root {
            --color-principal: #ffff00; /* El morado original */
            --color-fondo: #000000;     /* El negro de fondo original */
        }
        /* ======================================================= */

        body {
            font-family: monospace;
            background: var(--color-fondo);
            color: var(--color-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-height: 90vh; 
            position: relative;
        }

        .icono-esquina {
            position: absolute;
            top: 20px;   
            left: 20px;  
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        h1::after {
            content: "_";
            animation: p 1s infinite;
        }

        .grid {
            display: grid;
            /* Definimos un tamaño base para los botones (mínimo 140px, máximo 1fr) */
            grid-template-columns: repeat(auto-fit, minmax(140px, 200px)); 
            /* Esto centra el grupo de elementos horizontalmente en la pantalla */
            justify-content: center; 
            gap: 10px;
            width: 100%;
            max-width: 900px; 
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-principal);
            text-decoration: none;
            padding: 12px 10px; 
            border: 1px solid var(--color-principal);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            box-sizing: border-box;
        }

        a:hover {
            background: var(--color-principal);
            color: var(--color-fondo);
        }

        @keyframes p {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Diseño responsivo simplificado */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            a { font-size: 0.8rem; padding: 8px; }
            .icono-esquina { width: 24px; height: 24px; top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

   <h1>C:\PAGINAS_NOPOR</h1>

    <div class="grid">
        <a href="https://es.pornhub.com/" target="_blank">PornHub</a>
        <a href="https://www.xnxx.es/" target="_blank">Xnxx</a>
    </div>

</body>
</html>
