    <style>
        /* =======================================================
            CAMBIA LOS COLORES AQUÍ ABAJO Y SE MODIFICARÁ TODO 
        ======================================================= */
        :root {
            --color-principal: #0f0; /* El verde original */
            --color-fondo: #000000;     /* El negro de fondo original */
        }
        /* ======================================================= */

        body {
            font-family: monospace;
            background: var(--color-fondo);
            color: var(--color-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 90vh; 
            position: relative;
        }

        .icono-esquina {
            position: absolute;
            top: 20px;   
            left: 20px;  
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        h1::after {
            content: "_";
            animation: p 1s infinite;
        }

        /* SOLUCIÓN: Flexbox con ancho calculado exactamente para 5 columnas */
        .grid {
            display: flex;
            flex-wrap: wrap;       
            justify-content: center; /* Centra los botones sobrantes de la última fila */
            gap: 10px;
            width: 100%;
            /* 5 botones de 180px (900px) + 4 espacios de 10px (40px) = 940px */
            max-width: 940px; 
            margin: 0 auto;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-principal);
            text-decoration: none;
            padding: 12px 10px; 
            border: 1px solid var(--color-principal);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            width: 180px; /* Tamaño fijo para que entren exactos */
            box-sizing: border-box;
        }

        a:hover {
            background: var(--color-principal);
            color: var(--color-fondo);
        }

        @keyframes p {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Responsivo para pantallas de celular */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            a { font-size: 0.8rem; padding: 8px; width: 140px; }
            .icono-esquina { width: 24px; height: 24px; top: 15px; left: 15px; }
            .grid { max-width: 100%; } /* Permite que en celular se adapte al ancho de la pantalla */
        }
    </style>
