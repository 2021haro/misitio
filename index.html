<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páginas_de_películas_y_series</title>
    
    <link rel="icon" type="image/png" href="icono.png">

    <style>
        /* =======================================================
            CAMBIA LOS COLORES AQUÍ ABAJO Y SE MODIFICARÁ TODO 
        ======================================================= */
        :root {
            --color-principal: #0f0; /* El verde original */
            --color-fondo: #000000;     /* El negro de fondo original */
        }
        /* ======================================================= */

        body {
            font-family: monospace;
            background: var(--color-fondo);
            color: var(--color-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 90vh; 
            position: relative;
        }

        .icono-esquina {
            position: absolute;
            top: 20px;   
            left: 20px;  
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        h1::after {
            content: "_";
            animation: p 1s infinite;
        }

        /* CAMBIADO A FLEXBOX: Centrado horizontal absoluto para cualquier cantidad de elementos */
        .grid {
            display: flex;
            flex-wrap: wrap;       
            justify-content: center; /* Centra los botones horizontalmente siempre */
            gap: 10px;
            width: 100%;
            max-width: 900px; 
            margin: 0 auto;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-principal);
            text-decoration: none;
            padding: 12px 10px; 
            border: 1px solid var(--color-principal);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            width: 180px; /* Tamaño idéntico y ordenado para todos los botones */
            box-sizing: border-box;
        }

        a:hover {
            background: var(--color-principal);
            color: var(--color-fondo);
        }

        @keyframes p {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Responsivo para pantallas de celular */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            a { font-size: 0.8rem; padding: 8px; width: 140px; }
            .icono-esquina { width: 24px; height: 24px; top: 15px; left: 15px; }
        }
