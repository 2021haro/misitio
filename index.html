    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra el grid horizontalmente en la pantalla */
            justify-content: center;
            min-height: 90vh; /* Asegura un buen espacio vertical */
            position: relative;
        }

        /* Puedes borrar o dejar estos estilos del icono antiguo, ya no afectarán */
        .icono-esquina {
            position: absolute;
            top: 20px;   
            left: 20px;  
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        h1::after {
            content: "_";
            animation: p 1s infinite;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* CAMBIADO A 4 COLUMNAS */
            gap: 10px;
            width: 100%;
            max-width: 900px; /* Ajustado el ancho máximo para 4 columnas */
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0;
            text-decoration: none;
            padding: 12px 10px; /* Un poco más de espacio vertical */
            border: 1px solid #0f0;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
        }

        a:hover {
            background: #0f0;
            color: #000;
        }

        @keyframes p {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Diseño responsivo adaptado */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.2rem; }
            a { font-size: 0.8rem; padding: 8px; }
            .icono-esquina { width: 24px; height: 24px; top: 15px; left: 15px; }
        }
    </style>
</head>
