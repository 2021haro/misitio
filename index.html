    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Puedes borrar o dejar estos estilos del icono antiguo, ya no afectarán */
        .icono-esquina {
            position: absolute;
            top: 20px;   
            left: 20px;  
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        h1::after {
            content: "_";
            animation: p 1s infinite;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 1000px;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }

        /* --- CLASES DE COLORES POR FILA --- */
        
        /* Fila 1: Verde */
        .verde { color: #0f0; border: 1px solid #0f0; }
        .verde:hover { background: #0f0; color: #000; }

        /* Fila 2: Azul */
        .azul { color: #00bfff; border: 1px solid #00bfff; }
        .azul:hover { background: #00bfff; color: #000; }

        /* Fila 3: Roja */
        .roja { color: #ff0000; border: 1px solid #ff0000; }
        .roja:hover { background: #ff0000; color: #000; }

        /* Fila 4: Naranja */
        .naranja { color: #ff8c00; border: 1px solid #ff8c00; }
        .naranja:hover { background: #ff8c00; color: #000; }

        /* Fila 5: Morada */
        .morada { color: #ba55d3; border: 1px solid #ba55d3; }
        .morada:hover { background: #ba55d3; color: #000; }

        @keyframes p {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.2rem; }
            a { font-size: 0.8rem; padding: 8px; }
            .icono-esquina { width: 24px; height: 24px; top: 15px; left: 15px; }
        }
    </style>
</head>
